name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    name: Ruby ${{ matrix.ruby }} / ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        ruby:
          - "4.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Linux runtime packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ffmpeg libsndfile1 libsamplerate0

      - name: Install macOS runtime packages
        if: runner.os == 'macOS'
        run: brew install cmake ffmpeg libsndfile libsamplerate

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          rubygems: latest
          bundler-cache: true

      - name: Build and verify the native runtime
        env:
          COHERE_TRANSCRIBE_NATIVE_JOBS: "2"
        run: |
          ruby ext/cohere_transcribe_native/extconf.rb
          make -C ext/cohere_transcribe_native check

      - name: Run the default task
        run: bundle exec rake

      - name: Build the source gem
        id: gem
        run: |
          version=$(ruby -Ilib -rcohere/transcribe/version -e 'print Cohere::Transcribe::VERSION')
          gem build cohere-transcribe.gemspec
          gem_path="$PWD/cohere-transcribe-${version}.gem"
          test -f "$gem_path"
          echo "path=$gem_path" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install and verify the source gem
        env:
          COHERE_TRANSCRIBE_NATIVE_JOBS: "2"
        run: |
          install_root="$RUNNER_TEMP/cohere-transcribe-gem"
          gem install "${{ steps.gem.outputs.path }}" --install-dir "$install_root" --ignore-dependencies --no-document
          gem_root="$install_root/gems/cohere-transcribe-${{ steps.gem.outputs.version }}"
          test -d "$gem_root"
          ruby "$gem_root/ext/cohere_transcribe_native/test/abi_smoke.rb" "$gem_root/lib/cohere/transcribe/native"
          ruby -I"$gem_root/lib" -e 'require "cohere/transcribe"; abort "version mismatch" unless Cohere::Transcribe::VERSION == ARGV.fetch(0)' "${{ steps.gem.outputs.version }}"
          ruby -I"$gem_root/lib" "$gem_root/exe/cohere-transcribe-doctor" --help >/dev/null
